name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
      - run: go mod download
      - run: go tool templ generate
      - name: Verify generated files
        run: git diff --exit-code
      - run: go vet ./...
      - run: go test ./...
      - run: CGO_ENABLED=0 go build ./cmd/agentsession
